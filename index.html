<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Research Station</title>
    <!-- Підключення шрифту з Figma (Plus Jakarta Sans) -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Підключення стилів -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

   
    <header class="header">
        <h1 class="headertitle">Ocean Research Station</h1>
        <p class="headersubtitle">Discover the mysteries of the deep</p>
    </header>

   
    <section class="species-section">
        <h2 class="species-section__counter">
            Discovered species: <span id="counter">6</span>
        </h2>
        
        <div class="cards-container">
           
            <div class="card">Clownfish</div>
            <div class="card">Octopus</div>
            <div class="card">Jellyfish</div>
            <div class="card">Shark</div>
            <div class="card">Sea Turtle</div>
            <div class="card">Stingray</div>
        </div>
    </section>

    
    <section class="depths-section">
        <h2>Explore Ocean Depths</h2>
        
    </section>

    
    <script src="script.js"></script>
</body>
</html>
